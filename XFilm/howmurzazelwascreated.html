<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Как снимали Мурзазель (Бэкстейдж) — ИксФильм</title>
    <style>
        body { background-color: #0b0f19; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #161f30; padding: 30px; border-radius: 15px; text-align: left; max-width: 700px; width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h1 { color: #00ff66; margin-top: 0; text-align: center; font-size: 26px; }
        .movie-info-block { background: #0b0f19; padding: 12px; border-radius: 6px; font-size: 14px; margin: 15px 0; border-left: 3px solid #2b6cb0; color: #cbd5e0; }
        .player-desc { font-size: 14px; color: #cbd5e0; margin: 15px 0; line-height: 1.4; background: #0b0f19; padding: 12px; border-radius: 8px; border: 1px solid #2d3748; }
        video { width: 100%; border-radius: 10px; border: 2px solid #2d3748; margin-top: 10px; background-color: #000; }
        button { padding: 10px 20px; background-color: #4a5568; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 20px; transition: all 0.3s ease; }
button:hover { background-color: #718096; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
.submit-btn { background-color: #00ff66; color: #0b0f19; width: auto; padding: 8px 15px; font-size: 14px; margin-top: 5px; transition: all 0.3s ease; }
.submit-btn:hover { background-color: #1aff81; box-shadow: 0 0 15px #00ff66; transform: scale(1.03); }

        
        /* БЛОК РЕЦЕНЗИЙ */
        .reviews-section { margin-top: 30px; border-top: 1px solid #2d3748; padding-top: 20px; }
        .review-card { padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 5px solid; font-size: 14px; }
        .review-good { background-color: rgba(0, 255, 102, 0.05); border-color: #00ff66; color: #e6fffa; }
        .review-neutral { background-color: rgba(160, 174, 192, 0.05); border-color: #a0aec0; color: #edf2f7; }
        .review-bad { background-color: rgba(255, 77, 77, 0.05); border-color: #ff4d4d; color: #fff5f5; }
        .review-author { font-weight: bold; font-size: 13px; margin-bottom: 5px; display: flex; justify-content: space-between; }
        .review-type-tag { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 3px; text-transform: uppercase; }
        .tag-good { background: #00ff66; color: #0b0f19; }
        .tag-neutral { background: #a0aec0; color: #0b0f19; }
        .tag-bad { background: #ff4d4d; color: white; }
        textarea, select { width: 95%; padding: 12px; margin: 8px 0; border: 2px solid #2d3748; border-radius: 8px; background-color: #0b0f19; color: white; font-size: 14px; }
        .submit-btn { background-color: #00ff66; color: #0b0f19; width: auto; padding: 8px 15px; font-size: 14px; margin-top: 5px; }
        .submit-btn:hover { background-color: #00cc52; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Кнопка возврата на главную -->
        <button onclick="history.back()">⬅ Назад в каталог</button>
        
        <h1>Как снимали Мурзазель</h1>
        
        <div class="movie-info-block">
            📅 <strong>Год:</strong> 2026 г. | 🌍 <strong>Страна:</strong> Россия | 📍 <strong>Город съёмок:</strong> Тюмень
        </div>
        
        <div class="player-desc">
            <strong>Описание:</strong> Эксклюзивные бэкстейдж-кадры со съемочной площадки, где Маркиз кусает автомобильный ремень в Буханке.
        </div>
        
        <!-- ОНЛАЙН ПЛЕЕР ДЛЯ ВИДЕО ИЗ ОБЛАКА -->
        <!-- Замените текст ССЫЛКА_НА_ОБЛАКО на вашу прямую ссылку на видео бэкстейджа -->
        <video controls src="ССЫЛКА_НА_ОБЛАКО"></video>

        <!-- ИНТЕРАКТИВНЫЙ БЛОК ЦВЕТНЫХ РЕЦЕНЗИЙ -->
        <div class="reviews-section">
            <h2 style="color: #00ff66; font-size: 20px; margin-bottom: 15px;">Рецензии зрителей</h2>
            
            <!-- Форма добавления отзыва -->
            <div id="addReviewForm" style="background: #0b0f19; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #2d3748;">
                <h4 style="margin: 0 0 10px 0; color: #a0aec0;">Оставить свой отзыв на бэкстейдж:</h4>
                <select id="reviewRating">
                    <option value="good">🟢 Положительная (Хороший фильм)</option>
                    <option value="neutral">⚪ Нейтральная (Средний фильм)</option>
                    <option value="bad">🔴 Отрицательная (Плохой фильм)</option>
                </select>
                <textarea id="reviewText" rows="3" placeholder="Напишите вашу рецензию здесь..."></textarea>
                <button class="submit-btn" onclick="submitReview()">Опубликовать рецензию</button>
            </div>

            <div id="reviewsListContainer"></div>
        </div>
    </div>

    <script>
        const movieId = "howmurzazelwascreated";

        // Загрузка и вывод рецензий из локальной памяти
        function renderReviews() {
            const reviews = JSON.parse(localStorage.getItem('xFilmReviews')) || {};
            const container = document.getElementById('reviewsListContainer');
            container.innerHTML = '';

            if (!reviews[movieId] || reviews[movieId].length === 0) {
                container.innerHTML = '<p style="color: #a0aec0; font-style: italic;">Рецензий пока нет. Станьте первым!</p>';
                return;
            }

            reviews[movieId].forEach(rev => {
                const card = document.createElement('div');
                card.className = `review-card review-${rev.type}`;
                let typeText = rev.type === 'good' ? "Положительная" : rev.type === 'neutral' ? "Нейтральная" : "Отрицательная";
                card.innerHTML = `
                    <div class="review-author">
                        <span>👤 ${rev.author}</span>
                        <span class="review-type-tag tag-${rev.type}">${typeText}</span>
                    </div>
                    <div>${rev.text}</div>
                `;
                container.appendChild(card);
            });
        }

        // Публикация нового отзыва от имени Гостя или Авторизованного пользователя
        function submitReview() {
            const text = document.getElementById('reviewText').value.trim();
            const type = document.getElementById('reviewRating').value;
            if (!text) { alert("Введите текст рецензии!"); return; }

            const reviews = JSON.parse(localStorage.getItem('xFilmReviews')) || {};
            if (!reviews[movieId]) { reviews[movieId] = []; }

            // Если пользователь вошел — берем его имя, если нет — пишем «Гость»
            const authorName = "Гость";

            reviews[movieId].unshift({
                author: authorName,
                type: type,
                text: text
            });

            localStorage.setItem('xFilmReviews', JSON.stringify(reviews));
            document.getElementById('reviewText').value = '';
            renderReviews();
        }

        // Запуск вывода отзывов при открытии страницы
        renderReviews();
    </script>
</body>
</html>
